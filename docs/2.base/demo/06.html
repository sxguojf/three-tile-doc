<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>three-tile最小化应用</title>
  </head>
  <style>
    html,
    body {
      background-color: #333;
      height: 400px;
      width: 100%;
      padding: 0;
      margin: 0;
      display: flex;
      overflow: hidden;
    }
    #map {
      flex: 1;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdmirror.com/npm/three@0.165.0/examples/jsm/",
        "three-tile": "https://unpkg.com/three-tile@0.8.6/dist/three-tile.js"
      }
    }
  </script>

  <body>
    <div id="map"></div>
    <script type="module">
      import * as THREE from "three";
      import * as tt from "three-tile";
      import {
        CSS2DObject,
        CSS2DRenderer,
      } from "three/addons/renderers/CSS2DRenderer.js";

      console.log(`three-tile v${tt.version} start!`);

      //=====================================================================================
      // 创建地图
      const map = tt.TileMap.create({
        // 影像数据源
        imgSource: new tt.plugin.ArcGisSource(),
        // 地形数据源
        demSource: new tt.plugin.ArcGisDemSource(),
        lon0: 90,
      });
      // 地图旋转到xz平面
      map.rotateX(-Math.PI / 2);
      // 初始化场景
      const viewer = new tt.plugin.GLViewer("#map");
      // 地图添加到场景
      viewer.scene.add(map);

      //=====================================================================================
      // 地图中心经纬度高度（km）转为世界坐标
      const centerPostion = map.geo2world(new THREE.Vector3(100, 35, 0));
      // 摄像机经纬度高度（km）转为世界坐标
      const cameraPosition = map.geo2world(new THREE.Vector3(100, 10, 5000));
      viewer.flyTo(centerPostion, cameraPosition);

      //=====================================================================================
      // 添加标签容器
      const labelRenderer = new CSS2DRenderer();
      labelRenderer.setSize(
        viewer.container.clientWidth,
        viewer.container.clientHeight
      );
      labelRenderer.domElement.style.position = "absolute";
      labelRenderer.domElement.style.top = "0px";
      labelRenderer.domElement.style.color = "white";
      viewer.container.appendChild(labelRenderer.domElement);

      viewer.addEventListener("update", () => {
        labelRenderer.render(viewer.scene, viewer.camera);
      });

      window.addEventListener("resize", () =>
        labelRenderer.setSize(
          viewer.container.clientWidth,
          viewer.container.clientHeight
        )
      );

      const labelGroup = new THREE.Group();
      map.add(labelGroup);

      //=====================================================================================
      // 添加标签
      (() => {
        // 先画一堆地面垂直向上的箭头
        const dir = new THREE.Vector3(0, 0, 1);
        for (let x = 60; x < 140; x += 10) {
          for (let y = 0; y < 70; y += 10) {
            // 经纬度转换为模型坐标
            const pos = map.geo2pos(new THREE.Vector3(x, y));
            const arrow = new THREE.ArrowHelper(
              dir,
              new THREE.Vector3(pos.x, pos.y, -1),
              50
            );
            labelGroup.add(arrow);
          }
        }
        // 遍历箭头加上标签
        labelGroup.traverse((obj) => {
          if (obj instanceof THREE.ArrowHelper) {
            const label = document.createElement("span");
            label.className = "label";

            // 模型坐标转换为经纬度
            const lonlat = map.pos2geo(
              new THREE.Vector3(obj.position.x, obj.position.y)
            );
            label.innerHTML = `${lonlat.x.toFixed(0)},${lonlat.y.toFixed(0)}`;
            label.title = "提示信息： " + label.innerHTML;

            // 创建css2dObj加入场景
            const css = new CSS2DObject(label);
            css.position.copy(
              obj.position.clone().add(new THREE.Vector3(0, 0, 10))
            );
            labelGroup.add(css);
          }
        });
      })();
    </script>
  </body>
</html>
