<!DOCTYPE html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />
    <title>three-tile最小化应用</title>
  </head>
  <style>
    html,
    body {
      background-color: #333;
      height: 100%;
      width: 100%;
      padding: 0;
      margin: 0;
      display: flex;
      overflow: hidden;
    }
    #map {
      flex: 1;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three-tile": "https://unpkg.com/three-tile@0.8.5/dist/three-tile.js"
      }
    }
  </script>

  <body>
    <div id="map"></div>
    <script type="module">
      import * as THREE from "three";
      import * as tt from "three-tile";

      console.log(`three-tile v${tt.version} start!`);

      // MapBoxToken 请更换为你自己申请的key
      const MAPBOXKEY =
        "pk.eyJ1Ijoic3ZjLW9rdGEtbWFwYm94LXN0YWZmLWFjY2VzcyIsImEiOiJjbG5sMnBoMm0xeWZzMmtyaWl0b2wyN2FuIn0.-zx1KP3Oy-7YzWcvhbv22Q";

      // mapbox影像数据源
      const mapBoxImgSource = new tt.plugin.MapBoxSource({
        token: MAPBOXKEY,
        dataType: "image",
        style: "mapbox.satellite",
      });
      // mapbox地形数据源
      const mapBoxDemSource = new tt.plugin.MapBoxSource({
        token: MAPBOXKEY,
        dataType: "terrain-rgb",
        style: "mapbox.terrain-rgb",
        maxLevel: 15,
      });

      // 创建地图
      const map = tt.TileMap.create({
        // 影像数据源
        imgSource: mapBoxImgSource,
        // 地形数据源
        demSource: mapBoxDemSource,
        // 地图投影中心经度
        lon0: 90,
        // 最小缩放级别
        minLevel: 2,
        // 最大缩放级别
        maxLevel: 18,
      });
      // 地图旋转到xz平面
      map.rotateX(-Math.PI / 2);

      // 初始化场景
      const viewer = new tt.plugin.GLViewer("#map");

      // 地图添加到场景
      viewer.scene.add(map);
    </script>
  </body>
</html>
