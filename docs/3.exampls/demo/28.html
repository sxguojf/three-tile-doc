<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
        <title>three-tile最小化应用</title>
    </head>
    <style>
        html,
        body {
            color: white;
            background-color: #333;
            height: 100%;
            min-height: 600px;
            width: 100%;
            padding: 0;
            margin: 0;
            display: flex;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }

        #map {
            height: 100%;
            width: 100%;
        }
        #local-info {
            position: absolute;
            bottom: 0px;
            left: 20px;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.171.0/build/three.module.js",
                "three-tile": "https://unpkg.com/three-tile@0.11.9/dist",
                "three-tile-plugin": "https://unpkg.com/three-tile@0.11.9/dist/plugin"
            }
        }
    </script>

    <body>
        <div id="map"></div>
        <div id="local-info">-</div>

        <script type="module">
            import * as THREE from "three";
            import * as tt from "three-tile";
            import * as plugin from "three-tile-plugin";

            console.log(`three-tile v${tt.version} start!`);

            // 创建地图
            const map = tt.TileMap.create({
                // 影像数据源
                imgSource: [new plugin.ArcGisSource(), new plugin.GDSource({ style: "8" })],
                // 地形数据源
                demSource: new plugin.ArcGisDemSource(),
                // 中央子午线经度
                lon0: 90,
                // 地图经纬度范围
                bounds: [60, 0, 145, 60],
            });
            // 地图旋转到xz平面
            map.rotateX(-Math.PI / 2);

            // 初始化场景
            const viewer = new plugin.GLViewer("#map");
            viewer.scene.background = new THREE.Color(0x112233);

            // 地图添加到场景
            viewer.scene.add(map);

            //==============================================================
            // 地图中心经纬度高度（m）转为世界坐标
            const centerPostion = map.geo2world(new THREE.Vector3(108, 36, 0));
            // 摄像机经纬度高度（m）转为世界坐标
            const cameraPosition = map.geo2world(new THREE.Vector3(108, 20, 8000000));
            viewer.flyTo(centerPostion, cameraPosition, false);
            viewer.controls.maxDistance = 10000000;

            //==============================================================
            function showLocation(viewer, map, id) {
                const pointer = new THREE.Vector2();
                viewer.container.addEventListener("pointermove", (evt) => {
                    const lonlat = plugin.getLocalFromMouse(evt, map, viewer.camera);
                    if (lonlat) {
                        const el = document.querySelector(id);
                        el.innerHTML = `经度:${lonlat.x.toFixed(6)}° ,  纬度:${lonlat.y.toFixed(
                            6
                        )}° , 海拔:${lonlat.z.toFixed(1)}m`;
                    }
                });
            }
            showLocation(viewer, map, "#local-info");

            //==============================================================
            function addBounds(map) {
                const bounds = map.bounds;
                if (bounds) {
                    const projBounds = map.projection.getProjBoundsFromLonLat(bounds);
                    const box = new THREE.Box3(
                        new THREE.Vector3(projBounds[0], projBounds[1], 0),
                        new THREE.Vector3(projBounds[2], projBounds[3], 5000)
                    );
                    const boxHelper = new THREE.Box3Helper(box);
                    map.add(boxHelper);
                }
            }
            addBounds(map);
        </script>
    </body>
</html>
