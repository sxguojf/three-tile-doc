<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
        <title>three-tile最小化应用</title>
    </head>
    <style>
        html,
        body {
            color: white;
            background-color: #333;
            height: 100%;
            min-height: 800px;
            width: 100%;
            padding: 0;
            margin: 0;
            display: flex;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        #map {
            flex: 1;
        }
        .tools {
            display: flex;
            flex-direction: row;
        }
        #loading {
            width: 500px;
        }
        button {
            margin: 0 10px;
        }
        button:hover {
            background-color: darkcyan;
        }
    </style>
    <body>
        <div id="map"></div>
        <div class="tools">
            <div id="loading">-</div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
                    "three-tile": "https://unpkg.com/three-tile@0.10.3/dist",
                    "three-tile-plugin": "https://unpkg.com/three-tile@0.10.3/dist/plugin"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import * as tt from "three-tile";
            import * as plugin from "three-tile-plugin";

            console.log(`three-tile v${tt.version} start!`);

            // 创建地图
            const map = tt.TileMap.create({
                // 影像数据源
                imgSource: new plugin.ArcGisSource(),
                // 地形数据源
                demSource: new plugin.ArcGisDemSource(),
                lon0: 90,
                minLevel: 2,
            });
            // 地图旋转到xz平面
            map.rotateX(-Math.PI / 2);
            // 初始化场景
            const viewer = new plugin.GLViewer("#map");
            // 地图添加到场景
            viewer.scene.add(map);

            //==============================================================
            // 地图中心经纬度高度（m）转为世界坐标
            const centerPostion = map.geo2world(new THREE.Vector3(110, 30, 0));
            // 摄像机经纬度高度（m）转为世界坐标
            const cameraPosition = map.geo2world(new THREE.Vector3(110, 20, 3000 * 1000));
            // 漫游到指定位置
            viewer.flyTo(centerPostion, cameraPosition);

            //==============================================================
            // 显示地图加载进度
            function showLoading(map, id) {
                const el = document.querySelector("#loading");
                if (el) {
                    map.addEventListener("loading-start", (evt) => {
                        el.innerHTML = "Started: " + evt.itemsLoaded + " of " + evt.itemsTotal + " files.";
                    });
                    map.addEventListener("loading-progress", (evt) => {
                        el.innerHTML = "Loading: " + evt.itemsLoaded + " of " + evt.itemsTotal + " files.";
                    });
                    map.addEventListener("loading-complete", () => {
                        el.innerHTML = "Loading complete!";
                    });
                    map.addEventListener("loading-error", (url) => {
                        el.innerHTML = "There was an error loading " + url;
                    });
                }
            }
            showLoading(map);

            //==============================================================
            // 加载geojson

            // 1. 注册geosjon数据加载器：
            tt.registerImgLoader(new plugin.GeoJSONLoader());
            // 2. 声明一批geojson数据源
            const geojsonCountry = new plugin.GeoJSONSource({
                url: "../map/100000.json",
                style: {
                    stroke: true,
                    color: "red",
                    weight: 2,
                    shadowColor: "black",
                    shadowBlur: 3,
                    shadowOffset: [2, 2],
                },
            });

            const geojsonProvince = new plugin.GeoJSONSource({
                url: "../map/100000_full.json",
                style: {
                    stroke: true,
                    fill: false,
                    color: "Aqua",
                    weight: 1,
                },
            });

            const geojsonCity = new plugin.GeoJSONSource({
                url: "../map/100000_full_city.json",
                style: {
                    stroke: true,
                    color: "yellow",
                    weight: 0.6,
                },
            });

            const geojsonCityPoint = new plugin.GeoJSONSource({
                url: "../map/city.json",
                minLevel: 4,
                style: {
                    fill: true,
                    fillColor: "white",
                    fillOpacity: 1,
                    color: "black",
                    weight: 1,
                    shadowBlur: 3,
                    shadowColor: "black",
                },
            });

            map.imgSource = [new plugin.ArcGisSource(), geojsonProvince, geojsonCountry, geojsonCity, geojsonCityPoint];
            map.reload();
        </script>
    </body>
</html>
