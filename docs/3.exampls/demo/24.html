<!DOCTYPE html>
<html lang="zh-cn">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
        <title>three-tile最小化应用</title>
    </head>
    <style>
        html,
        body {
            color: white;
            background-color: #333;
            height: 100%;
            min-height: 600px;
            width: 100%;
            padding: 0;
            margin: 0;
            display: flex;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        #map {
            height: 100%;
            width: 100%;
        }

        #loading {
            position: absolute;
            bottom: 0px;
            right: 20px;
        }

        #compass-container {
            position: absolute;
            height: 75px;
            width: 75px;
            left: 30px;
            bottom: 50px;
        }
    </style>
    <body>
        <div id="map"></div>
        <div id="loading">-</div>
        <!-- 罗盘 -->
        <div id="compass-container"></div>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.171.0/build/three.module.js",
                    "three-tile": "https://unpkg.com/three-tile@0.11.9/dist",
                    "three-tile-plugin": "https://unpkg.com/three-tile@0.11.9/dist/plugin",
                    "three/addons/": "https://unpkg.com/three@0.171.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from "three";
            import * as tt from "three-tile";
            import * as plugin from "three-tile-plugin";
            import { GUI } from "three/addons/libs/lil-gui.module.min.js";

            console.log(`three-tile v${tt.version} start!`);

            // 注册背景加载器
            tt.registerImgLoader(new plugin.BackgroundLoader());
            // 背景数据源
            const background = tt.TileSource.create({ dataType: "background", color: 0x1123456 });

            // 创建地图
            const map = tt.TileMap.create({
                // 影像数据源
                imgSource: [background, new plugin.GDSource({ style: 8 })],
                lon0: 90,
                minLevel: 4,
                // backgroundColor: 0x003366,
            });
            // 地图旋转到xz平面
            map.rotateX(-Math.PI / 2);

            // 初始化场景
            const viewer = new plugin.GLViewer("#map");

            // 地图添加到场景
            viewer.scene.add(map);

            //==============================================================
            // 显示地图加载进度
            function showLoading(map, id) {
                const el = document.querySelector("#loading");
                if (el) {
                    map.addEventListener("loading-start", (evt) => {
                        el.innerHTML = "Started: " + evt.itemsLoaded + " of " + evt.itemsTotal + " files.";
                    });
                    map.addEventListener("loading-progress", (evt) => {
                        el.innerHTML = "Loading: " + evt.itemsLoaded + " of " + evt.itemsTotal + " files.";
                    });
                    map.addEventListener("loading-complete", () => {
                        el.innerHTML = "Loading complete!";
                    });
                    map.addEventListener("loading-error", (url) => {
                        el.innerHTML = "There was an error loading " + url;
                    });
                }
            }
            showLoading(map);

            //==============================================================
            // 添加罗盘
            const compass = plugin.createCompass(viewer.controls);
            const compassContainer = document.querySelector("#compass-container");
            compassContainer && compassContainer.appendChild(compass.dom);

            //==============================================================
            // flyto 目标位置
            const center = map.geo2world(new THREE.Vector3(108.89, 34.2));
            viewer.flyTo(center, new THREE.Vector3(center.x, 80000, center.z + 1000));
        </script>
    </body>
</html>
